<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pixel Quest RPG</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- HUD -->
    <div id="hud">
      <div id="hud-left">
        <span id="hud-level">LV 1</span>
        <div id="xp-bar-wrap"><div id="xp-bar"></div></div>
      </div>
      <div id="hud-center">
        <div class="bar-row">
          <span class="bar-label">HP</span>
          <div class="bar-track"><div id="hp-bar" class="bar-fill red"></div></div>
          <span id="hp-text" class="bar-val">100</span>
        </div>
        <div class="bar-row">
          <span class="bar-label">MP</span>
          <div class="bar-track"><div id="mp-bar" class="bar-fill blue"></div></div>
          <span id="mp-text" class="bar-val">30</span>
        </div>
      </div>
      <div id="hud-right">🪙 <span id="gold-val">0</span></div>
    </div>

    <!-- SCREENS -->
    <div id="screens">

      <!-- EXPLORE -->
      <div id="screen-explore" class="screen active">
        <div id="area-banner">
          <span id="area-icon">🌲</span>
          <span id="area-name">Enchanted Forest</span>
        </div>
        <div id="player-wrap">
          <canvas id="player-canvas" width="64" height="64"></canvas>
          <div id="step-counter">Steps: <span id="step-val">0</span></div>
        </div>
        <button id="explore-btn" onclick="doStep()">⚔ EXPLORE</button>
        <div id="log-box"><div id="log"></div></div>
      </div>

      <!-- COMBAT -->
      <div id="screen-combat" class="screen">
        <div id="combat-stage">
          <div class="combatant">
            <div id="enemy-name-lbl" class="cname">Slime</div>
            <canvas id="enemy-canvas" width="64" height="64"></canvas>
            <div class="bar-track slim"><div id="enemy-hp-bar" class="bar-fill red"></div></div>
            <span id="enemy-hp-text" class="bar-val">10/10</span>
          </div>
          <div id="vs-icon">⚔</div>
          <div class="combatant">
            <div id="pcombat-name" class="cname">Hero</div>
            <canvas id="player-combat-canvas" width="64" height="64"></canvas>
            <div class="bar-track slim"><div id="pcombat-hp-bar" class="bar-fill red"></div></div>
            <span id="pcombat-hp-text" class="bar-val">100/100</span>
          </div>
        </div>
        <div id="combat-log-box"><div id="combat-log"></div></div>
        <div id="combat-btns">
          <button class="cbtn" onclick="combatAction('attack')">⚔ Attack</button>
          <button class="cbtn" onclick="combatAction('skill')">✨ Skill</button>
          <button class="cbtn" onclick="combatAction('flee')">🏃 Flee</button>
        </div>
      </div>

      <!-- CHARACTER -->
      <div id="screen-char" class="screen">
        <h2>Character</h2>
        <canvas id="char-canvas" width="64" height="64" style="margin:8px auto"></canvas>
        <div class="panel">
          <div class="stat-row"><span>Level</span><span id="s-level">1</span></div>
          <div class="stat-row"><span>XP</span><span id="s-xp">0 / 100</span></div>
          <div class="stat-row"><span>HP</span><span id="s-hp">100 / 100</span></div>
          <div class="stat-row"><span>MP</span><span id="s-mp">30 / 30</span></div>
          <div class="stat-row"><span>ATK</span><span id="s-atk">8</span></div>
          <div class="stat-row"><span>DEF</span><span id="s-def">3</span></div>
          <div class="stat-row"><span>Kills</span><span id="s-kills">0</span></div>
        </div>
        <h3>Equipment</h3>
        <div class="panel">
          <div class="equip-row" id="eq-weapon">🗡 <span>Empty</span></div>
          <div class="equip-row" id="eq-armor">🛡 <span>Empty</span></div>
          <div class="equip-row" id="eq-acc">💍 <span>Empty</span></div>
        </div>
      </div>

      <!-- INVENTORY -->
      <div id="screen-inventory" class="screen">
        <h2>Inventory</h2>
        <div id="inv-gold">🪙 Gold: <span id="inv-gold-val">0</span></div>
        <div id="inv-tip">Tap items to equip/use</div>
        <div id="inv-grid"></div>
      </div>

    </div>

    <!-- BOTTOM NAV -->
    <nav id="bottom-nav">
      <button class="nav-btn active" onclick="showScreen('explore',this)">🗺<br><small>Explore</small></button>
      <button class="nav-btn" onclick="showScreen('char',this)">🧙<br><small>Char</small></button>
      <button class="nav-btn" onclick="showScreen('inventory',this)">🎒<br><small>Items</small></button>
    </nav>

  </div>
  <script src="game.js"></script>
</body>
</html>
